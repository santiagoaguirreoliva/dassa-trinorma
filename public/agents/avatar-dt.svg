<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 440" width="440" height="440" role="img" aria-label="DT — Director Técnico, orquestador del ecosistema DASSA">
  <defs>
    <radialGradient id="dt-bg" cx="50%" cy="34%" r="86%">
      <stop offset="0%" stop-color="#2A0407"/>
      <stop offset="56%" stop-color="#1A0103"/>
      <stop offset="100%" stop-color="#050000"/>
    </radialGradient>
    <radialGradient id="dt-core" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FF6B72"/>
      <stop offset="55%" stop-color="#C8202C"/>
      <stop offset="100%" stop-color="#7A0F18"/>
    </radialGradient>
    <linearGradient id="dt-node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EFE3"/>
      <stop offset="100%" stop-color="#D8CFBC"/>
    </linearGradient>
  </defs>
  <circle cx="220" cy="220" r="220" fill="url(#dt-bg)"/>
  <circle cx="220" cy="220" r="206" fill="none" stroke="#C8202C" stroke-opacity="0.28" stroke-width="2"/>
  <!-- 6 radios = 6 agentes hijos coordinados por DT -->
  <g stroke="#C8202C" stroke-opacity="0.55" stroke-width="3" stroke-linecap="round">
    <line x1="220" y1="220" x2="220" y2="100"/>
    <line x1="220" y1="220" x2="324" y2="160"/>
    <line x1="220" y1="220" x2="324" y2="280"/>
    <line x1="220" y1="220" x2="220" y2="340"/>
    <line x1="220" y1="220" x2="116" y2="280"/>
    <line x1="220" y1="220" x2="116" y2="160"/>
  </g>
  <!-- 6 nodos = 6 directores (fico, luz, sincro, triny, comex, fort) -->
  <g fill="url(#dt-node)">
    <circle cx="220" cy="100" r="22"/>
    <circle cx="324" cy="160" r="22"/>
    <circle cx="324" cy="280" r="22"/>
    <circle cx="220" cy="340" r="22"/>
    <circle cx="116" cy="280" r="22"/>
    <circle cx="116" cy="160" r="22"/>
  </g>
  <!-- Núcleo: el DT -->
  <circle cx="220" cy="220" r="62" fill="#0B0000" stroke="#C8202C" stroke-opacity="0.5" stroke-width="3"/>
  <circle cx="220" cy="220" r="46" fill="url(#dt-core)"/>
  <text x="220" y="234" font-family="Mulish, Segoe UI, sans-serif" font-size="40" font-weight="800"
        fill="#FFFFFF" text-anchor="middle">DT</text>
</svg>
