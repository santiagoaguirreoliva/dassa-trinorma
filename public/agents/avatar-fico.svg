  <circle cx="354" cy="150" r="9" fill="#2BB8BE"/>
  <!-- Contenedor de carga -->
  <g transform="translate(220 232)">
    <rect x="-78" y="-44" width="156" height="88" rx="7" fill="url(#fi-cont)"
