    <g stroke="#9A6A1E" stroke-width="3" stroke-opacity="0.7">
      <line x1="-44" y1="-44" x2="-44" y2="44"/>
      <line x1="-8" y1="-44" x2="-8" y2="44"/>
      <line x1="28" y1="-44" x2="28" y2="44"/>
      <line x1="56" y1="-44" x2="56" y2="44"/>
    </g>
    <rect x="-78" y="-44" width="156" height="20" rx="7" fill="#0A0D12" fill-opacity="0.18"/>
  </g>
  <text x="220" y="356" font-family="Mulish, Segoe UI, sans-serif" font-size="40" font-weight="800"
