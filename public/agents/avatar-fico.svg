  </defs>
  <circle cx="220" cy="220" r="220" fill="url(#fi-bg)"/>
  <circle cx="220" cy="220" r="206" fill="none" stroke="#E8A33D" stroke-opacity="0.22" stroke-width="2"/>
  <!-- Ruta de seguimiento de la carga -->
  <path d="M86 300 Q160 196 220 232 T354 150" fill="none" stroke="#E8A33D"
