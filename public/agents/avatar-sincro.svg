<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 440" width="440" height="440" role="img" aria-label="SINCRO — agente de IA de Coordinación y Operaciones">
  <defs>
    <radialGradient id="sc-bg" cx="50%" cy="36%" r="80%">
      <stop offset="0%" stop-color="#27407F"/>
      <stop offset="55%" stop-color="#13205A"/>
      <stop offset="100%" stop-color="#080F33"/>
    </radialGradient>
    <linearGradient id="sc-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAF1FF"/>
      <stop offset="100%" stop-color="#AEC2EC"/>
    </linearGradient>
    <linearGradient id="sc-suit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2C66"/>
      <stop offset="100%" stop-color="#0C1640"/>
    </linearGradient>
    <clipPath id="sc-clip"><circle cx="220" cy="220" r="208"/></clipPath>
  </defs>

  <circle cx="220" cy="220" r="218" fill="#080F33"/>
  <g clip-path="url(#sc-clip)">
    <rect width="440" height="440" fill="url(#sc-bg)"/>

    <!-- radar grid -->
    <g fill="none" stroke="#5BBDC9" stroke-opacity="0.14" stroke-width="1.4">
      <line x1="0" y1="110" x2="440" y2="110"/>
      <line x1="0" y1="220" x2="440" y2="220"/>
      <line x1="0" y1="330" x2="440" y2="330"/>
      <line x1="110" y1="0" x2="110" y2="440"/>
      <line x1="220" y1="0" x2="220" y2="440"/>
      <line x1="330" y1="0" x2="330" y2="440"/>
    </g>
    <!-- network nodes feeding the head -->
    <g stroke="#5BBDC9" stroke-opacity="0.5" stroke-width="1.6">
      <line x1="56" y1="80" x2="150" y2="170"/>
      <line x1="384" y1="86" x2="290" y2="170"/>
      <line x1="44" y1="300" x2="150" y2="250"/>
      <line x1="398" y1="296" x2="292" y2="250"/>
    </g>
    <g fill="#5BBDC9">
      <circle cx="56" cy="80" r="5"/>
      <circle cx="384" cy="86" r="5"/>
      <circle cx="44" cy="300" r="5"/>
      <circle cx="398" cy="296" r="5"/>
    </g>
    <!-- red pulse — la mala noticia llega primero -->
    <circle cx="384" cy="86" r="13" fill="none" stroke="#C8202C" stroke-width="2.4"/>
    <circle cx="384" cy="86" r="5" fill="#C8202C"/>

    <!-- shoulders -->
    <path d="M74 440 C86 356 142 320 220 320 C298 320 354 356 366 440 Z" fill="url(#sc-suit)"/>
    <path d="M220 320 L206 372 L220 392 L234 372 Z" fill="#5BBDC9"/>
    <path d="M188 332 L188 440 M252 332 L252 440" stroke="#0A1235" stroke-width="3"/>

    <!-- neck -->
    <path d="M200 292 q20 22 40 0 l0 30 q-20 14 -40 0 Z" fill="#9FB4DF"/>

    <!-- head — geometric helmet -->
    <path d="M150 196 C150 124 180 92 220 92 C260 92 290 124 290 196 C290 254 262 286 220 286 C178 286 150 254 150 196 Z" fill="url(#sc-head)"/>
    <!-- visor band -->
    <path d="M156 182 C168 168 272 168 284 182 L284 214 C272 226 168 226 156 214 Z" fill="#0C1640"/>
    <!-- scanning eyes -->
    <rect x="178" y="190" width="30" height="11" rx="5.5" fill="#5BBDC9"/>
    <rect x="232" y="190" width="30" height="11" rx="5.5" fill="#5BBDC9"/>
    <circle cx="208" cy="195.5" r="3.4" fill="#fff"/>
    <circle cx="262" cy="195.5" r="3.4" fill="#fff"/>
    <!-- straight, focused mouth line -->
    <line x1="200" y1="252" x2="240" y2="252" stroke="#3A4A86" stroke-width="4" stroke-linecap="round"/>
    <!-- crown circuit -->
    <path d="M180 120 h28 v-16 M232 120 h28 v-16" fill="none" stroke="#5BBDC9" stroke-width="3" stroke-linecap="round"/>
    <circle cx="180" cy="104" r="4.5" fill="#5BBDC9"/>
    <circle cx="260" cy="104" r="4.5" fill="#5BBDC9"/>
    <!-- side sync arrows -->
    <path d="M150 200 l-14 -8 0 16 Z" fill="#5BBDC9"/>
    <path d="M290 200 l14 -8 0 16 Z" fill="#5BBDC9"/>
  </g>
  <circle cx="220" cy="220" r="206" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="3"/>
</svg>
